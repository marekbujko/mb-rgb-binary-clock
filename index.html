<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RGB Binary Clock v1.1 by Marek Bujko</title>
    <style>
        body { 
            background: #000; color: #eee; font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }

        /* Toggle INT/US */
        .toggle-zone {
            margin-bottom: 25px; background: #111; padding: 10px 20px;
            border-radius: 30px; border: 1px solid #333; display: flex; align-items: center; gap: 15px;
            font-size: 0.8rem; color: #888;
        }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222; transition: .3s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px;
            left: 3px; bottom: 3px; background-color: #555; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #444; }
        input:checked + .slider:before { transform: translateX(20px); background-color: #fff; }

        .case {
            background: #0a0a0a; padding: 40px; border-radius: 12px;
            border: 1px solid #151515; text-align: center; margin-bottom: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .led-row { display: flex; gap: 20px; flex-direction: row-reverse; margin-bottom: 40px; }
        .led-unit { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .led {
            width: 55px; height: 55px; border-radius: 50%; 
            background-color: #000; border: 1px solid #000; 
            transition: background-color 0.1s, box-shadow 0.1s;
        }

        /* Color-coded labels under LEDs */
        .bit-info { font-size: 10px; font-weight: bold; line-height: 1.3; }
        .h-bit { color: #ff4444; } /* Red */
        .m-bit { color: #44ff44; } /* Green */
        .s-bit { color: #4444ff; } /* Blue */
        .divider { color: #333; }

        #lcd {
            background: #001100; color: #00ff00; padding: 15px 25px;
            border-radius: 2px; border: 4px solid #1a1a1a; width: 280px;
            height: 60px; /* Fixed height */
            text-align: left; font-size: 1.25rem; font-family: 'Consolas', monospace;
            box-shadow: inset 0 0 20px #000; line-height: 1.3;
            margin: 0 auto 25px auto; text-transform: uppercase;
            display: flex; flex-direction: column; justify-content: center;
        }

        .stats-info {
            margin-top: 10px; display: grid; grid-template-columns: repeat(3, 1fr);
            font-size: 0.75rem; border-top: 1px solid #111; padding-top: 15px; width: 100%;
        }
        .val { display: block; font-size: 1.1rem; color: #888; margin-top: 4px; font-weight: bold; }
        
        .h-c { color: #ff4444; } 
        .m-c { color: #44ff44; } 
        .s-c { color: #4444ff; }

        .serial-monitor {
            background: #111; padding: 15px; border-radius: 8px; 
            border: 1px solid #333; width: 340px; text-align: center;
        }
        .serial-monitor label { font-size: 0.7rem; color: #666; display: block; margin-bottom: 8px; }
        .serial-monitor input {
            background: #000; border: 1px solid #444; color: #0f0;
            padding: 8px; width: 60%; font-family: monospace; outline: none; border-radius: 3px;
        }
        .serial-monitor button {
            background: #222; color: #fff; border: 1px solid #444; padding: 8px 12px;
            cursor: pointer; font-family: monospace; transition: 0.2s; border-radius: 3px;
        }
        .serial-monitor button:hover { background: #333; color: #0f0; }
        
        .danger-btn {
        background: #222;
        color: #fff;
        border: 1px solid #444;
        padding: 8px 12px;
        cursor: pointer;
        font-family: monospace;
        transition: 0.2s;
        border-radius: 3px;
        margin-top: 5px;
}

        .danger-btn:hover {
        color: #ff4444 !important; /* Red text on hover */
        border-color: #ff4444;
        background: #1a0000;
}
#dots-btn {
    width: 40px;
    height: 36px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
}
    </style>
</head>
<body>
    <div class="main-title">RGB Binary Clock v1.1</div>
    <br>
    <div class="toggle-zone">
        <span>INT MODE</span>
        <label class="switch"><input type="checkbox" id="langToggle"><span class="slider"></span></label>
        <span>US MODE</span>
    </div>

    <div class="case">
        <div class="led-row">
            <div class="led-unit">
                <div id="led-0" class="led"></div>
                <div class="bit-info"><span class="m-bit">M1</span><span class="divider">/</span><span class="s-bit">S1</span></div>
            </div>
            <div class="led-unit">
                <div id="led-1" class="led"></div>
                <div class="bit-info"><span class="m-bit">M2</span><span class="divider">/</span><span class="s-bit">S2</span></div>
            </div>
            <div class="led-unit">
                <div id="led-2" class="led"></div>
                <div class="bit-info"><span class="h-bit">H1</span><br><span class="m-bit">M4</span><span class="divider">/</span><span class="s-bit">S4</span></div>
            </div>
            <div class="led-unit">
                <div id="led-3" class="led"></div>
                <div class="bit-info"><span class="h-bit">H2</span><br><span class="m-bit">M8</span><span class="divider">/</span><span class="s-bit">S8</span></div>
            </div>
            <div class="led-unit">
                <div id="led-4" class="led"></div>
                <div class="bit-info"><span class="h-bit">H4</span><br><span class="m-bit">M16</span><span class="divider">/</span><span class="s-bit">S16</span></div>
            </div>
            <div class="led-unit">
                <div id="led-5" class="led"></div>
                <div class="bit-info"><span class="h-bit">H8</span><br><span class="m-bit">M32</span><span class="divider">/</span><span class="s-bit">S32</span></div>
            </div>
        </div>

        <div id="lcd">
            <div id="row1">00:00:00 23.4°C</div>
            <div id="row2">04.03.2026</div>
        </div>

        <div class="stats-info">
            <div class="h-c">HRS (R)<span id="val-h" class="val">0</span></div>
            <div class="m-c">MIN (G)<span id="val-m" class="val">0</span></div>
            <div class="s-c">SEC (B)<span id="val-s" class="val">0</span></div>
        </div>
    </div>

<!-- Connection Panel -->
<div class="serial-monitor" id="connection-interface" style="margin-bottom: 10px;">
    <button id="connect-btn" style="width: 100%; font-weight: bold; background: #222;">CONNECT SERIAL PORT (115200)</button>
</div>

<!-- Hidden Controls (Visible after connect) -->
<div class="serial-monitor" id="serial-controls" style="display: none; margin-bottom: 10px; gap: 5px; flex-direction: column;">
    <button id="start-stream-btn" style="color: #0f0;">START SERIAL RECEIVE</button>
    <button id="sync-date-btn">SEND SYSTEM DATE TO COM</button>
    <button id="disconnect-btn" class="danger-btn">DISCONNECT SERIAL</button>
</div>

    <div class="serial-monitor">
        <label id="serial-label">Format: HH MM SS DD MM YYYY</label>
        <div style="display: flex; gap: 5px; justify-content: center; align-items: center; position: relative;">
            <input type="text" id="serialInput" placeholder="Command..." style="flex: 1;">
            <input type="date" id="datePicker" style="position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; left: 50%;">
            <button id="dots-btn" type="button" style="width: 36px; height: 36px; padding: 0; flex-shrink: 0; font-weight: bold; display: flex; align-items: center; justify-content: center;">...</button>
            <button id="send-btn" onclick="parseSerial()">SEND</button>
            
        </div>
    </div>
    
<div class="copyright-footer" style="text-align: center;">
    <br>
    &copy; 2026 Marek Bujko
    <br>
    <a href="https://github.com/marekbujko/mb-rgb-binary-clock" style="color: white;">
        GitHub project
    </a>
</div>

    <script>
        let baseTemp = 23.4;
        let isBooting = true;
        setTimeout(() => { isBooting = false; }, 2000);
            
        const langToggle = document.getElementById('langToggle');
        let virtualOffset = 0;  
        let port, reader, isStreaming = false;
        let updateMsgTime = 0;


async function parseSerial() {
    const input = document.getElementById('serialInput').value.trim();
    if (!input) return;

    const p = input.split(/\s+/).map(Number);
    const isUS = langToggle.checked;
    let target = new Date();

    if (!isUS && p.length >= 6) {
        let year = p[5] < 100 ? p[5] + 2000 : p[5];
        target = new Date(year, p[4] - 1, p[3], p[0], p[1], p[2]);
    } else if (isUS && p.length >= 6) {
        let h = p[0], amPm = p[3], mo = p[4], d = p[5], y = p[6] || p[5];
        if (amPm === 1 && h < 12) h += 12;
        if (amPm === 0 && h === 12) h = 0;
        let year = y < 100 ? y + 2000 : y;
        target = new Date(year, mo - 1, d, h, p[1], p[2]);
    } else {
        alert("Invalid format!"); return;
    }

    virtualOffset = target.getTime() - Date.now();
    updateMsgTime = 3;

    if (port && port.writable) {
        try {
            const writer = port.writable.getWriter();
            // I add \n so Arduino's Serial.parseInt() processes it immediately
            await writer.write(new TextEncoder().encode(input + "\n"));
            writer.releaseLock();
            console.log("Sent to Arduino: " + input);
        } catch (err) {
            console.error("Failed to send to Serial:", err);
        }
    }

    document.getElementById('serialInput').value = "";
}

document.getElementById('dots-btn').onclick = function(e) {
    e.preventDefault();
    const picker = document.getElementById('datePicker');
    
    if (typeof picker.showPicker === 'function') {
        picker.showPicker();
    } else {
        picker.click();
    }
};

document.getElementById('dots-btn').onclick = function(e) {
    e.preventDefault();
    const picker = document.getElementById('datePicker');
    if (typeof picker.showPicker === 'function') {
        picker.showPicker();
    } else {
        picker.click();
    }
};

document.getElementById('datePicker').onchange = function() {
    if (!this.value) return;
    
    const selectedDate = new Date(this.value);
    const now = new Date();
    const isUS = document.getElementById('langToggle').checked;
    
    // ... (váš existujúci kód pre formátovanie d, month, year atď.)
    const day = String(selectedDate.getDate()).padStart(2, '0');
    const month = String(selectedDate.getMonth() + 1).padStart(2, '0');
    const year = selectedDate.getFullYear();
    const h24 = now.getHours();
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');

    if (isUS) {
        const h12 = h24 % 12 || 12;
        const amPm = h24 >= 12 ? 1 : 0;
        document.getElementById('serialInput').value = `${String(h12).padStart(2, '0')} ${m} ${s} ${amPm} ${month} ${day} ${year}`;
    } else {
        document.getElementById('serialInput').value = `${String(h24).padStart(2, '0')} ${m} ${s} ${day} ${month} ${year}`;
    }
    // SAFARI fix
    const self = this;
    setTimeout(() => {
        self.blur();
        const parent = self.parentNode;
        const next = self.nextSibling;
        parent.removeChild(self);
        parent.insertBefore(self, next);
    }, 100);
};

// Serial Handling Logic
async function readSerialData() {
    const decoder = new TextDecoder();
    while (port.readable && isStreaming) {
        reader = port.readable.getReader();
        try {
            let buffer = "";
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value);
                if (buffer.includes('\n')) {
                    let lines = buffer.split('\n');
                    let lastLine = lines[lines.length - 2]; 
                    
                    // Regex for US (Integer F) and INT (Float C)
                    const usMatch = lastLine.match(/(\d{2})\/(\d{2})\/(\d{4})\s*\|\s*(\d{2}):(\d{2}):(\d{2})\s*(AM|PM)\s*\|\s*Temp:\s*([\d.]+)\s*F/);
                    const intMatch = lastLine.match(/(\d{2})\.(\d{2})\.(\d{4})\s*\|\s*(\d{2}):(\d{2}):(\d{2})\s*\|\s*Temp:\s*([\d.]+)\s*C/);

                    if (usMatch) {
                        let [_, mo, d, y, h, m, s, amp, tempF] = usMatch;
                        let h24 = parseInt(h);
                        if (amp === "PM" && h24 < 12) h24 += 12;
                        if (amp === "AM" && h24 === 12) h24 = 0;
                        virtualOffset = new Date(y, mo - 1, d, h24, m, s).getTime() - Date.now();
                        baseTemp = (parseFloat(tempF) - 32) / 1.8;  // Sync Integer F (1.8 = 5/9)
                    } else if (intMatch) {
                        let [_, d, mo, y, h, m, s, tempC] = intMatch;
                        virtualOffset = new Date(y, mo - 1, d, h, m, s).getTime() - Date.now();
                        baseTemp = parseFloat(tempC); // Sync Float C
                    }
                    buffer = lines[lines.length - 1];
                }
            }
        } catch (err) { break; } finally { reader.releaseLock(); }
    }
}

// Button Events
document.getElementById('connect-btn').addEventListener('click', async () => {
    try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        document.getElementById('connection-interface').style.display = 'none';
        document.getElementById('serial-controls').style.display = 'flex';
        
                const sBtn = document.getElementById('send-btn');
        sBtn.innerHTML = 'SEND<div style="font-size: 8px; font-weight: normal; line-height: 1; margin-top: 2px; text-transform: uppercase;">TO COM</div>';
        sBtn.style.color = "#0f0";
        
    } catch (err) { alert("Connect failed!"); }
});

document.getElementById('start-stream-btn').addEventListener('click', () => {
    isStreaming = !isStreaming;
    const btn = document.getElementById('start-stream-btn');
    
    // UI Update
    btn.innerText = isStreaming ? "STOP SERIAL RECEIVE" : "START SERIAL RECEIVE";
    btn.style.color = isStreaming ? "#ff4444" : "#0f0";
    
    if (isStreaming) {
        readSerialData(); // Start listening to Arduino
    } else {
        // RESET: This part returns the clock to "System Mode"
        if (reader) reader.cancel(); 
        virtualOffset = 0; 
        baseTemp = 23.4; 
    }
});

document.getElementById('sync-date-btn').addEventListener('click', async () => {
    if (port && port.writable) {
        const writer = port.writable.getWriter();
        const now = new Date();
        let payload = langToggle.checked ? 
            `${now.getHours() % 12 || 12} ${now.getMinutes()} ${now.getSeconds()} ${now.getHours() >= 12 ? 1 : 0} ${now.getMonth()+1} ${now.getDate()} ${now.getFullYear()}\n` :
            `${now.getHours()} ${now.getMinutes()} ${now.getSeconds()} ${now.getDate()} ${now.getMonth()+1} ${now.getFullYear()}\n`;
        await writer.write(new TextEncoder().encode(payload));
        writer.releaseLock();
        updateMsgTime = 3; 
    }
});

document.getElementById('disconnect-btn').addEventListener('click', async () => {
    isStreaming = false;
    if (reader) {
        try { await reader.cancel(); await reader.releaseLock(); } catch(e){}
        reader = null;
    }
    if (port) {
        try { await port.close(); } catch(e){}
        port = null;
    }
    // Return UI to "Not Connected" state
    document.getElementById('connection-interface').style.display = 'block';
    document.getElementById('serial-controls').style.display = 'none';
    
    // Global Reset
    virtualOffset = 0; 
    baseTemp = 23.4;
    
    // Ensure Start button is reset for next connection
    const sBtn = document.getElementById('start-stream-btn');
    sBtn.innerText = "START SERIAL RECEIVE";
    sBtn.style.color = "#0f0";
    
        document.getElementById('send-btn').innerHTML = 'SEND';
    document.getElementById('send-btn').style.color = "#fff";
});

        function update() {
            const isUS = langToggle.checked;
            document.getElementById('serial-label').innerText = isUS ? 
                "Format: HH MM SS AM_PM MM DD YYYY (0=AM, 1=PM)" : 
                "Format: HH MM SS DD MM YYYY";

            const now = new Date(Date.now() + virtualOffset);
            let h24 = now.getHours(), h12 = h24 % 12 || 12, m = now.getMinutes(), s = now.getSeconds();
            let isPM = h24 >= 12;
            let tempC; 
            if (isStreaming) {
                tempC = baseTemp; 
            } else {
                tempC = 23.4 + (Math.sin(Date.now() / 15000) * 1.5);
}

            const r1 = document.getElementById('row1');
            const r2 = document.getElementById('row2');
            
            if (isBooting) {
            r1.innerText = "RGB Clock v1.1";
            r2.innerText = "(c) Marek Bujko";
                
            for (let i = 0; i < 6; i++) {
            const led = document.getElementById(`led-${i}`);
            led.style.backgroundColor = "#000";
            led.style.boxShadow = "none";
                }
                return;
            }

            if (updateMsgTime > 0) {
                r1.innerText = "TIME UPDATED!";
                r2.innerText = "\u00A0"; // Non-breaking space keeps line height
                updateMsgTime--;
            } else {
                const d = String(now.getDate()).padStart(2,'0'), mo = String(now.getMonth()+1).padStart(2,'0'), y = now.getFullYear();
                if (isUS) {
                    r1.innerText = `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${isPM?'PM':'AM'}`;
                    r2.innerText = `${mo}/${d}/${y} ${Math.round(tempC*1.8+32)}°F`;
                } else {
                    r1.innerText = `${String(h24).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${tempC.toFixed(1)}°C`;
                    r2.innerText = `${d}.${mo}.${y}`;
                }
            }

            document.getElementById('val-h').innerText = h12;
            document.getElementById('val-m').innerText = m;
            document.getElementById('val-s').innerText = s;

            for (let i = 0; i < 6; i++) {
                const led = document.getElementById(`led-${i}`);
                const hBit = (i >= 2) ? (h12 >> (i - 2)) & 1 : 0;
                const mBit = (m >> i) & 1, sBit = (s >> i) & 1;
                const r = hBit ? 255:0, g = mBit ? 255:0, b = sBit ? 255:0;

                if (!r && !g && !b) {
                    led.style.backgroundColor = "#000"; led.style.boxShadow = "none"; led.style.borderColor = "#000";
                } else {
                    const color = `rgb(${r},${g},${b})`;
                    led.style.backgroundColor = color;
                    led.style.boxShadow = `0 0 ${(r+g+b===765)?32:18}px 4px rgba(${r},${g},${b},0.6)`;
                    led.style.borderColor = `rgba(${r},${g},${b},0.2)`;
                }
            }
        }
        setInterval(update, 1000); update();
    </script>
</body>
</html>
